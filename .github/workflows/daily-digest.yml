name: 🌅 Village – Daglig morgenrapport

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    name: Hent statistikk og send rapport
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer avhengigheter
        run: cd .github/scripts && npm install

      - name: Kjør daglig rapport
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
        run: node .github/scripts/daily-digest.mjsgi